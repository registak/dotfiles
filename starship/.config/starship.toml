"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"
add_newline = true

format = """
$container\
$directory\
$git_branch\
$git_status\
$git_state\
$character"""

right_format = """
$status\
$jobs\
$cmd_duration\
$nodejs\
$python\
$time"""

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"

[directory]
style = "bold peach"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
repo_root_style = "bold peach"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style) "

[git_branch]
format = "on [$branch]($style) "
style = "bold blue"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "mauve"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = '\$'
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"
show_notifications = true
min_time_to_notify = 30_000

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "
style = "green"

[python]
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "yellow"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold maroon"

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = "✘ "
success_symbol = ""
style = "bold red"

[jobs]
format = '[$symbol$number]($style) '
symbol = "✦ "
style = "bold teal"

[container]
format = '[$symbol \[$name\]]($style) '
symbol = "⬢"
style = "bold sapphire"

[time]
disabled = false
format = '[$time]($style)'
style = "dimmed white"
time_format = "%l:%M%p"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
