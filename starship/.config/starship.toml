"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
$git_branch\
$git_status\
$character"""

right_format = """
$cmd_duration\
$nodejs\
$python\
$time"""

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"

[directory]
style = "bold peach"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "on [$branch]($style) "
style = "bold blue"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "mauve"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "
style = "green"
detect_files = ["package.json"]

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "yellow"

[time]
disabled = false
format = '[$time]($style)'
style = "dimmed white"
time_format = "%l:%M%p"

